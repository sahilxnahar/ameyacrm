# Ameya Heights CRM — full local/self-hosted stack.
#   docker compose up -d --build
# App: http://localhost:3000  ·  MinIO console: http://localhost:9001  ·  Mailpit: http://localhost:8025
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ameya
      POSTGRES_PASSWORD: ameya
      POSTGRES_DB: ameya_crm
    volumes:
      - db_data:/var/lib/postgresql/data
    ports: ['5432:5432']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ameya -d ameya_crm']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports: ['9000:9000', '9001:9001']

  createbucket:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 2; done;
      /usr/bin/mc mb -p local/ameya-crm;
      /usr/bin/mc anonymous set none local/ameya-crm;
      exit 0;"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports: ['1025:1025', '8025:8025']

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://ameya:ameya@db:5432/ameya_crm?schema=public
      SESSION_SECRET: ${SESSION_SECRET:-please-change-me-openssl-rand-base64-48-xxxxxxxx}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-please-change-me-32-byte-key-xxxxxxxxxxxxxxxx}
      STORAGE_PROVIDER: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ameya-crm
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      EMAIL_PROVIDER: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SEED_ON_START: "true"
    ports: ['3000:3000']

volumes:
  db_data:
  minio_data:
